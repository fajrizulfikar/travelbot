<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelBot AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    #chat-header {
      background: #1a56db;
      color: #fff;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chat-header .dot {
      width: 10px;
      height: 10px;
      background: #34d399;
      border-radius: 50%;
    }

    #chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg-row.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg-row.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: #1a56db;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.bot .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .booking-btn {
      margin-top: 8px;
      display: inline-block;
      padding: 8px 16px;
      background: #1a56db;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .booking-btn:hover { background: #1447c0; }

    .services-row {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .service-chip {
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .escalation-banner {
      margin-top: 8px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #92400e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .escalation-banner::before {
      content: "⚠";
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #f3f4f6;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      max-width: 80%;
    }

    #input-bar {
      flex-shrink: 0;
      border-top: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: #1a56db; }
    #msg-input:disabled { background: #f9fafb; }

    #send-btn {
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: #1447c0; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .timestamp {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
      padding: 0 4px;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <div class="dot"></div>
      TravelBot AI
    </div>
    <div id="chat-thread">
      <!-- Messages rendered here -->
    </div>
    <div id="input-bar">
      <textarea
        id="msg-input"
        placeholder="Ask about flights, hotels, tours..."
        rows="1"
      ></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    // Change this base URL to match your deployment
    const API_BASE = "http://localhost:8000/api/v1";

    // ── State ─────────────────────────────────────────────────────────────────
    const sessionId = crypto.randomUUID();
    let inFlight = false;

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const thread   = document.getElementById("chat-thread");
    const input    = document.getElementById("msg-input");
    const sendBtn  = document.getElementById("send-btn");

    // ── Helpers ───────────────────────────────────────────────────────────────
    function scrollToBottom() {
      thread.scrollTop = thread.scrollHeight;
    }

    function formatTime() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function setLoading(loading) {
      inFlight = loading;
      input.disabled = loading;
      sendBtn.disabled = loading;
    }

    // ── Render helpers ────────────────────────────────────────────────────────
    function appendUserMessage(text) {
      const row = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="timestamp">${formatTime()}</div>
      `;
      thread.appendChild(row);
      scrollToBottom();
      return row;
    }

    function appendTypingIndicator() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typing-indicator-row";
      row.innerHTML = `
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      `;
      thread.appendChild(row);
      scrollToBottom();
      return row;
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typing-indicator-row");
      if (el) el.remove();
    }

    function appendBotResponse(data) {
      const row = document.createElement("div");
      row.className = "msg-row bot";

      let html = `<div class="bubble">${escapeHtml(data.answer)}</div>`;

      if (data.booking_link) {
        html += `<a class="booking-btn" href="${escapeHtml(data.booking_link)}" target="_blank" rel="noopener">Book Now</a>`;
      }

      if (data.related_services && data.related_services.length > 0) {
        const chips = data.related_services
          .map(s => `<span class="service-chip">${escapeHtml(s)}</span>`)
          .join("");
        html += `<div class="services-row">${chips}</div>`;
      }

      if (data.escalate) {
        html += `<div class="escalation-banner">Connecting you to a human agent…</div>`;
      }

      html += `<div class="timestamp">${formatTime()}</div>`;
      row.innerHTML = html;
      thread.appendChild(row);
      scrollToBottom();
    }

    function appendError(message) {
      const el = document.createElement("div");
      el.className = "error-msg";
      el.textContent = message;
      thread.appendChild(el);
      scrollToBottom();
    }

    // ── Send message ──────────────────────────────────────────────────────────
    async function sendMessage() {
      const text = input.value.trim();
      if (!text || inFlight) return;

      input.value = "";
      input.style.height = "auto";
      appendUserMessage(text);
      setLoading(true);
      appendTypingIndicator();

      try {
        const resp = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        });

        removeTypingIndicator();

        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          const errMsg = errData?.error?.message || `Server error (${resp.status})`;
          appendError(`Error: ${errMsg}`);
        } else {
          const data = await resp.json();
          appendBotResponse(data);
        }
      } catch (err) {
        removeTypingIndicator();
        appendError("Could not reach the server. Please check your connection.");
      } finally {
        setLoading(false);
        input.focus();
      }
    }

    // ── Auto-resize textarea ──────────────────────────────────────────────────
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    // ── Enter to send (Shift+Enter for newline) ───────────────────────────────
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    // ── Welcome message ───────────────────────────────────────────────────────
    (function init() {
      appendBotResponse({
        answer: "Hello! I'm TravelBot AI. Ask me about flights, hotels, tours, or anything travel-related. How can I help you today?",
        booking_link: null,
        related_services: [],
        escalate: false,
      });
      input.focus();
    })();
  </script>
</body>
</html>
